<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The Sunken Colosseum Concept</title>
  <desc id="desc">A stormy 3/4 view of an enclosed flooded amphitheater boss arena with tiered stone walls, arched gateway, braziers, central dais, rain, lightning, and a small figure for scale.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16222B"/>
      <stop offset="0.48" stop-color="#25353A"/>
      <stop offset="1" stop-color="#6F8587"/>
    </linearGradient>
    <radialGradient id="lightningGlow" cx="67%" cy="11%" r="42%">
      <stop offset="0" stop-color="#D8F4FF" stop-opacity="0.72"/>
      <stop offset="0.22" stop-color="#9FD8E8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#9FD8E8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wetStone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#627776"/>
      <stop offset="0.55" stop-color="#394D4D"/>
      <stop offset="1" stop-color="#223235"/>
    </linearGradient>
    <linearGradient id="mossStone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53685C"/>
      <stop offset="1" stop-color="#263C36"/>
    </linearGradient>
    <radialGradient id="water" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#6C9495" stop-opacity="0.86"/>
      <stop offset="0.55" stop-color="#2D575D" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#123036" stop-opacity="0.98"/>
    </radialGradient>
    <linearGradient id="reflection" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C6EAF0" stop-opacity="0.48"/>
      <stop offset="0.45" stop-color="#7EA9AD" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#123036" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFE6A3"/>
      <stop offset="0.42" stop-color="#E9832C"/>
      <stop offset="1" stop-color="#B63B22" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurMist">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 700 18px Arial, sans-serif; fill: #D9E8E8; letter-spacing: 0; }
      .rain { stroke: #B6C9CB; stroke-width: 1.5; stroke-linecap: round; opacity: 0.28; }
      .rim { fill: none; stroke: #9DB5B1; stroke-width: 2.5; opacity: 0.42; }
      .joint { stroke: #1B292C; stroke-width: 1; opacity: 0.42; }
      .crack { fill: none; stroke: #A9C0BD; stroke-width: 2; opacity: 0.34; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#lightningGlow)"/>

  <g opacity="0.48">
    <path d="M0 205 C155 160 245 207 375 176 C515 144 592 194 725 160 C880 120 983 175 1120 142 C1190 126 1240 132 1280 146 L1280 0 L0 0 Z" fill="#111D25"/>
    <path d="M0 260 C170 226 270 275 410 232 C565 184 676 245 830 201 C980 158 1120 215 1280 178 L1280 720 L0 720 Z" fill="#435A5C" opacity="0.32"/>
  </g>
  <path d="M923 0 L889 70 L919 60 L861 164 L888 103 L857 113 Z" fill="#D8F4FF" opacity="0.85" filter="url(#softGlow)"/>

  <g class="rain">
    <path d="M75 18 l-28 72"/><path d="M148 80 l-26 68"/><path d="M235 8 l-30 78"/><path d="M315 86 l-28 72"/>
    <path d="M405 34 l-32 82"/><path d="M505 110 l-25 67"/><path d="M596 46 l-32 80"/><path d="M696 3 l-28 74"/>
    <path d="M790 88 l-30 75"/><path d="M875 42 l-26 72"/><path d="M990 97 l-31 82"/><path d="M1070 26 l-29 78"/>
    <path d="M1160 100 l-31 76"/><path d="M1240 46 l-27 70"/><path d="M35 225 l-23 58"/><path d="M112 320 l-25 65"/>
    <path d="M1210 288 l-24 63"/><path d="M1018 250 l-30 80"/><path d="M868 300 l-22 58"/><path d="M650 255 l-29 75"/>
  </g>

  <ellipse cx="640" cy="612" rx="632" ry="78" fill="#15262A" opacity="0.62" filter="url(#blurMist)"/>

  <g id="colosseum" transform="translate(0 24)">
    <ellipse cx="640" cy="421" rx="560" ry="221" fill="#18282B" opacity="0.86"/>

    <path d="M87 410 C165 252 352 166 640 166 C928 166 1115 252 1193 410 L1160 451 C1067 322 888 258 640 258 C392 258 213 322 120 451 Z" fill="url(#wetStone)"/>
    <path d="M130 442 C226 312 402 244 640 244 C878 244 1054 312 1150 442 L1112 486 C1012 389 850 338 640 338 C430 338 268 389 168 486 Z" fill="url(#mossStone)" opacity="0.92"/>
    <path d="M179 492 C278 398 435 350 640 350 C845 350 1002 398 1101 492 L1050 526 C955 463 815 431 640 431 C465 431 325 463 230 526 Z" fill="url(#wetStone)" opacity="0.95"/>
    <path d="M249 535 C344 474 475 444 640 444 C805 444 936 474 1031 535 L960 568 C876 534 770 517 640 517 C510 517 404 534 320 568 Z" fill="#2B4143"/>

    <g opacity="0.7">
      <ellipse cx="640" cy="253" rx="425" ry="109" class="rim"/>
      <ellipse cx="640" cy="336" rx="470" ry="146" class="rim"/>
      <ellipse cx="640" cy="432" rx="423" ry="128" class="rim"/>
      <ellipse cx="640" cy="514" rx="327" ry="89" class="rim"/>
    </g>

    <g opacity="0.5">
      <path d="M178 385 L247 409 M295 305 L350 333 M457 251 L478 286 M640 227 L640 263 M824 251 L802 287 M985 306 L930 333 M1101 385 L1033 409" class="joint"/>
      <path d="M222 463 L294 482 M375 394 L415 430 M534 363 L547 407 M745 364 L733 407 M904 394 L865 430 M1057 463 L985 482" class="joint"/>
    </g>

    <g id="north-gateway">
      <path d="M554 146 L554 315 L726 315 L726 146 C705 118 678 104 640 104 C602 104 575 118 554 146 Z" fill="#1B292D"/>
      <path d="M585 315 L585 168 C602 146 620 135 640 135 C660 135 678 146 695 168 L695 315 Z" fill="#0D171B"/>
      <path d="M560 146 C588 111 614 95 640 95 C666 95 692 111 720 146" fill="none" stroke="#8AA09E" stroke-width="10" opacity="0.6"/>
      <path d="M552 318 L728 318" stroke="#92AAA6" stroke-width="8" opacity="0.45"/>
    </g>

    <g opacity="0.55">
      <path d="M1125 417 C1148 385 1170 367 1194 365 C1219 367 1240 385 1262 417 L1250 445 C1232 422 1215 411 1194 411 C1174 411 1156 422 1138 445 Z" fill="#1B292D"/>
      <path d="M18 417 C40 385 62 367 86 365 C111 367 133 385 155 417 L142 445 C124 422 106 411 86 411 C66 411 48 422 30 445 Z" fill="#1B292D"/>
      <path d="M555 602 C584 584 611 575 640 575 C669 575 696 584 725 602 L704 622 C683 612 662 607 640 607 C618 607 597 612 576 622 Z" fill="#1B292D"/>
    </g>

    <ellipse cx="640" cy="520" rx="318" ry="96" fill="url(#water)"/>
    <ellipse cx="640" cy="520" rx="316" ry="94" fill="none" stroke="#A8C7C5" stroke-width="3" opacity="0.38"/>
    <path d="M563 464 C604 482 683 482 725 464 C695 510 591 510 563 464 Z" fill="url(#reflection)" opacity="0.8"/>
    <path d="M585 515 C637 492 717 499 785 529 M459 544 C532 522 616 535 683 560 M748 557 C818 540 875 544 914 570" class="crack"/>

    <g id="dais">
      <ellipse cx="640" cy="505" rx="82" ry="28" fill="#1B2C30" opacity="0.45"/>
      <path d="M562 489 C582 466 609 455 640 455 C671 455 698 466 718 489 L701 512 C683 500 663 494 640 494 C617 494 597 500 579 512 Z" fill="#506463"/>
      <ellipse cx="640" cy="489" rx="78" ry="25" fill="#728684"/>
      <ellipse cx="640" cy="487" rx="48" ry="14" fill="#435958" opacity="0.78"/>
    </g>

    <g id="braziers" filter="url(#softGlow)">
      <g transform="translate(512 310)">
        <ellipse cx="0" cy="34" rx="27" ry="8" fill="#11191B"/>
        <rect x="-10" y="0" width="20" height="35" fill="#26383A"/>
        <path d="M-28 0 C-12 -14 14 -14 28 0 C18 9 -18 9 -28 0 Z" fill="#36494A"/>
        <circle cx="0" cy="-9" r="34" fill="url(#fire)" opacity="0.92"/>
        <path d="M0 -38 C16 -16 8 5 -7 12 C-20 0 -10 -17 0 -38 Z" fill="#FFE6A3"/>
      </g>
      <g transform="translate(768 310)">
        <ellipse cx="0" cy="34" rx="27" ry="8" fill="#11191B"/>
        <rect x="-10" y="0" width="20" height="35" fill="#26383A"/>
        <path d="M-28 0 C-12 -14 14 -14 28 0 C18 9 -18 9 -28 0 Z" fill="#36494A"/>
        <circle cx="0" cy="-9" r="34" fill="url(#fire)" opacity="0.92"/>
        <path d="M0 -38 C16 -16 8 5 -7 12 C-20 0 -10 -17 0 -38 Z" fill="#FFE6A3"/>
      </g>
      <g transform="translate(203 471) scale(.7)"><rect x="-9" y="0" width="18" height="32" fill="#26383A"/><circle cx="0" cy="-8" r="28" fill="url(#fire)" opacity="0.75"/></g>
      <g transform="translate(1077 471) scale(.7)"><rect x="-9" y="0" width="18" height="32" fill="#26383A"/><circle cx="0" cy="-8" r="28" fill="url(#fire)" opacity="0.75"/></g>
    </g>

    <g id="figure" transform="translate(604 522)">
      <ellipse cx="0" cy="34" rx="16" ry="5" fill="#071014" opacity="0.45"/>
      <circle cx="0" cy="0" r="6" fill="#0B1418"/>
      <path d="M0 7 L0 25 M-11 13 L10 13 M-5 25 L-11 38 M5 25 L12 38" stroke="#0B1418" stroke-width="5" stroke-linecap="round"/>
      <path d="M13 10 L23 34" stroke="#A8B9B7" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <g opacity="0.35" filter="url(#blurMist)">
    <ellipse cx="330" cy="535" rx="230" ry="32" fill="#C8D8D6"/>
    <ellipse cx="910" cy="484" rx="260" ry="35" fill="#C8D8D6"/>
    <ellipse cx="645" cy="598" rx="390" ry="42" fill="#D7E2DF"/>
  </g>

  <text x="40" y="668" class="label">THE SUNKEN COLOSSEUM - enclosed flooded amphitheater, tiered stone walls, four arched gates</text>
</svg>
