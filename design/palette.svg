<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="220" viewBox="0 0 1280 220" role="img" aria-labelledby="title desc">
  <title id="title">The Sunken Colosseum Palette</title>
  <desc id="desc">Labelled colour swatches for the Sunken Colosseum level concept.</desc>
  <rect width="1280" height="220" fill="#101A1F"/>
  <style>
    .label { font: 700 20px Arial, sans-serif; fill: #E4F0EF; letter-spacing: 0; }
    .hex { font: 16px Consolas, monospace; fill: #BFD1D0; }
  </style>
  <g transform="translate(40 36)">
    <g>
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#16222B"/>
      <text x="0" y="128" class="label">storm sky</text>
      <text x="0" y="154" class="hex">#16222B</text>
    </g>
    <g transform="translate(196 0)">
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#394D4D"/>
      <text x="0" y="128" class="label">wet stone</text>
      <text x="0" y="154" class="hex">#394D4D</text>
    </g>
    <g transform="translate(392 0)">
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#53685C"/>
      <text x="0" y="128" class="label">mossy stone</text>
      <text x="0" y="154" class="hex">#53685C</text>
    </g>
    <g transform="translate(588 0)">
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#2D575D"/>
      <text x="0" y="128" class="label">floodwater</text>
      <text x="0" y="154" class="hex">#2D575D</text>
    </g>
    <g transform="translate(784 0)">
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#E9832C"/>
      <text x="0" y="128" class="label">brazier fire</text>
      <text x="0" y="154" class="hex">#E9832C</text>
    </g>
    <g transform="translate(980 0)">
      <rect x="0" y="0" width="172" height="96" rx="8" fill="#D8F4FF"/>
      <text x="0" y="128" class="label">lightning</text>
      <text x="0" y="154" class="hex">#D8F4FF</text>
    </g>
  </g>
</svg>
