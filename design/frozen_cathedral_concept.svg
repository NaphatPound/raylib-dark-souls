<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Frozen Cathedral Arena Concept Art</title>
  <desc id="desc">A cold pale-blue boss arena inside shattered gothic cathedral ruins, with ice pillars, glowing crystals, fog, god-rays, a frozen reflective lake floor, and a lone figure for scale.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.42" stop-color="#16304a"/>
      <stop offset="0.72" stop-color="#9fbed1"/>
      <stop offset="1" stop-color="#d8eef3"/>
    </linearGradient>
    <linearGradient id="iceFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7f5fb" stop-opacity="0.55"/>
      <stop offset="0.38" stop-color="#8eb6c9" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#173047" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#51616b"/>
      <stop offset="0.45" stop-color="#2c3942"/>
      <stop offset="1" stop-color="#111923"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1ffff" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#9bd9ee" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#2d617d" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#d7ffff" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#8eeeff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#54c7e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reflectionFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8f6ff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#06111f" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="thinGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="floorClip">
      <path d="M0 444 C220 385 394 372 640 375 C887 378 1073 392 1280 448 L1280 720 L0 720 Z"/>
    </clipPath>
    <clipPath id="arenaClip">
      <ellipse cx="640" cy="515" rx="545" ry="150"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

